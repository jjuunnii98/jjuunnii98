name: GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "github-metrics*.svg"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: jjuunnii98
          template: classic
          base: header, activity
          config_theme: tokyonight
          config_padding: 10%, 5%
          filename: github-metrics.svg
          committer_message: "chore(metrics): update stats [skip ci]"

      - name: Languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: jjuunnii98
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_theme: tokyonight
          config_padding: 10%, 5%
          filename: github-metrics-langs.svg
          committer_message: "chore(metrics): update languages [skip ci]"
