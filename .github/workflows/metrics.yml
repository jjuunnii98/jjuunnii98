name: GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "github-metrics.svg"
      - "streak.json"

jobs:
  streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Calculate streak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_streak.py

      - name: Commit streak.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streak.json
          git diff --staged --quiet || (git commit -m "chore(streak): update streak [skip ci]" && git push)

  metrics:
    runs-on: ubuntu-latest
    needs: streak
    permissions:
      contents: write
    steps:
      - name: Stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: jjuunnii98
          template: classic
          base: header, activity
          config_theme: tokyonight
          config_padding: 10%, 5%
          filename: github-metrics.svg
          committer_message: "chore(metrics): update stats [skip ci]"
