name: GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "github-metrics.svg"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: jjuunnii98
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_indepth: yes
          config_theme: tokyonight
          config_padding: 6%, 0
          filename: github-metrics.svg
          committer_message: "chore(metrics): update GitHub metrics [skip ci]"
